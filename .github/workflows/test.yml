name: Check Runner NAT Type for P2P

on:
  workflow_dispatch:
  push:                # optional, for quick testing

jobs:
  nat-test:
    runs-on: ubuntu-latest
    steps:
      - name: Download and prepare STUN client
        run: |
          echo "Downloading stunclient..."
          curl -fSL --retry 5 --retry-delay 10 \
               -o stunclient.tar.gz \
               http://stunprotocol.org/stunclient-1.2.5-linux-amd64.tar.gz

          tar -xzf stunclient.tar.gz

          # The archive may contain just the binary, or a folder with the binary inside.
          if [ -f stunclient ]; then
            chmod +x stunclient
          elif [ -d stunclient* ]; then
            # Move binary from the subdirectory into the current directory
            mv stunclient*/stunclient . && chmod +x stunclient
            rm -rf stunclient*/
          else
            echo "❌ Could not locate stunclient binary. Directory contents:"
            ls -laR
            exit 1
          fi

          rm -f stunclient.tar.gz

      - name: Run NAT behavior test
        run: ./stunclient stunserver2025.stunprotocol.org --mode behavior
