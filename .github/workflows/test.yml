name: Check Runner NAT Type for P2P

on:
  workflow_dispatch:   # manual trigger
  push:                # optional, run on push for testing

jobs:
  nat-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependency
        run: pip install pystun3

      - name: Run NAT type check
        run: python3 check_nat.py
