name: Check Runner NAT Type for P2P

on:
  workflow_dispatch:   # Allows manual trigger
  push:                # Optional: run on push for quick testing

jobs:
  nat-test:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: Try installing stun-client from package manager (Primary)
        id: apt_install
        continue-on-error: true
        run: sudo apt-get install -y stun-client

      - name: Download and run STUNTMAN client (Fallback)
        if: steps.apt_install.outcome == 'failure'
        run: |
          echo "Package install failed. Attempting direct download..."
          curl --retry 3 --retry-delay 5 -L -o stunclient.tar.gz http://stunprotocol.org/stunclient-1.2.5-linux-amd64.tar.gz
          tar -xzf stunclient.tar.gz
          chmod +x stunclient
          
      - name: Run NAT behavior test
        run: |
          if command -v stun-client &> /dev/null; then
            stun-client stunserver2025.stunprotocol.org --mode behavior
          else
            ./stunclient stunserver2025.stunprotocol.org --mode behavior
          fi
